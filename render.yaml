# Render Deployment Configuration for LUMA (Æther Learning Sanctuary)
# Blueprints: https://render.com/docs/yaml-spec

services:
  - type: static
    name: luma-student-app
    plan: free
    
    # Use 'npm ci' for deterministic, faster, and reliable CI builds
    buildCommand: npm ci && npm run build
    
    # Path to the compiled static assets generated by Vite
    publishPath: dist
    
    # SPA Rewrite Rule: Directs all routes back to index.html for client-side routing
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    
    envVars:
      # Pinned to Node 20 LTS to avoid engine conflicts with Vite 6 / React 19 / ESBuild during build
      - key: NODE_VERSION
        value: "20.x"
